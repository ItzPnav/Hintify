version: "3.8"
services:
  PostgresDBMS:
    image: postgres:15
    container_name: PostgresDBMS
    environment:
      POSTGRES_PASSWORD: ChangeMe123!
      POSTGRES_USER: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro

volumes:
  pgdata: